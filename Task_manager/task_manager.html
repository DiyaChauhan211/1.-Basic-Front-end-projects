
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Task Manager</title>

<style>
  /* ===== GOOGLE FONT ===== */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --primary:#2563eb;
  --primary-hover:#1d4ed8;
  --success:#16a34a;
  --danger:#dc2626;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --shadow:0 10px 30px rgba(0,0,0,0.08);
  --radius:18px;
}

/* ===== BODY ===== */
body{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at top left,#dbeafe 0%,transparent 30%),
    radial-gradient(circle at bottom right,#e0e7ff 0%,transparent 25%),
    var(--bg);
  min-height:100vh;
  padding:50px 20px;
  color:var(--text);
  display:flex;
  justify-content:center;
}

/* ===== MAIN CONTAINER ===== */
.container{
  width:100%;
  max-width:900px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.4);
  border-radius:28px;
  padding:35px;
  box-shadow:var(--shadow);
}

/* ===== TITLE ===== */
h1{
  text-align:center;
  font-size:2.7rem;
  font-weight:700;
  margin-bottom:30px;
  color:#0f172a;
  letter-spacing:-1px;
}

/* ===== SECTION TITLES ===== */
h2{
  margin:35px 0 18px;
  font-size:1.2rem;
  font-weight:600;
  color:#1e293b;
}

/* ===== FORM ===== */
.task-form{
  display:grid;
  grid-template-columns:2fr 1fr 1fr auto;
  gap:14px;
  margin-bottom:10px;
}

/* ===== INPUTS ===== */
.task-form input,
.task-form select{
  padding:14px 16px;
  border:1px solid var(--border);
  border-radius:14px;
  background:#fff;
  font-size:15px;
  transition:all 0.25s ease;
  color:var(--text);
}

.task-form input:focus,
.task-form select:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(37,99,235,0.12);
  outline:none;
}

/* ===== BUTTON ===== */
.task-form button{
  border:none;
  background:linear-gradient(135deg,var(--primary),#3b82f6);
  color:white;
  padding:14px 22px;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.25s ease;
  box-shadow:0 8px 18px rgba(37,99,235,0.25);
}

.task-form button:hover{
  background:linear-gradient(135deg,var(--primary-hover),var(--primary));
  transform:translateY(-2px);
}

/* ===== TASK LIST ===== */
.task-list{
  list-style:none;
  display:flex;
  flex-direction:column;
  gap:16px;
}

/* ===== TASK CARD ===== */
.task{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
  display:flex;
  align-items:center;
  gap:18px;
  transition:all 0.25s ease;
  box-shadow:0 5px 15px rgba(0,0,0,0.04);
  position:relative;
  overflow:hidden;
}

/* LEFT ACCENT BAR */
.task::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:6px;
  height:100%;
  background:var(--primary);
}

.task:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 25px rgba(0,0,0,0.08);
}

/* ===== COMPLETED ===== */
.task.completed{
  opacity:0.82;
  background:#f0fdf4;
}

.task.completed::before{
  background:var(--success);
}

.task.completed h3{
  text-decoration:line-through;
  color:#94a3b8;
}

/* ===== TASK CONTENT ===== */
.task-info{
  flex:1;
}

.task-info h3{
  font-size:1.05rem;
  margin-bottom:8px;
  color:#0f172a;
  font-weight:600;
}

.task-info p{
  font-size:14px;
  color:var(--muted);
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}

/* ===== CATEGORY TAGS ===== */
.category{
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  letter-spacing:0.3px;
}

.Work{
  background:#dbeafe;
  color:#1d4ed8;
}

.Personal{
  background:#dcfce7;
  color:#15803d;
}

.Study{
  background:#fef3c7;
  color:#b45309;
}

/* ===== BUTTON GROUP ===== */
.buttons{
  display:flex;
  gap:10px;
}

/* ===== ACTION BUTTONS ===== */
.complete-btn,
.delete-btn{
  border:none;
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.25s ease;
  color:white;
}

.complete-btn{
  background:var(--success);
}

.complete-btn:hover{
  background:#15803d;
  transform:translateY(-1px);
}

.delete-btn{
  background:var(--danger);
}

.delete-btn:hover{
  background:#b91c1c;
  transform:translateY(-1px);
}

/* ===== CHECKBOX ===== */
input[type="checkbox"]{
  width:20px;
  height:20px;
  accent-color:var(--primary);
  cursor:pointer;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-thumb{
  background:#cbd5e1;
  border-radius:20px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){

  .container{
    padding:25px;
  }

  h1{
    font-size:2rem;
  }

  .task-form{
    grid-template-columns:1fr;
  }

  .task{
    flex-direction:column;
    align-items:flex-start;
  }

  .buttons{
    width:100%;
    justify-content:flex-end;
  }
}
</style>
</head>
<body>

  <div class="container">

    <h1>Task Manager</h1>

    <div class="task-form">
      <input type="text" id="taskInput" placeholder="Enter task">

      <select id="categoryInput">
        <option value="Work">Work</option>
        <option value="Personal">Personal</option>
        <option value="Study">Study</option>
      </select>

      <input type="date" id="dateInput">

      <button onclick="addTask()">Add</button>
    </div>

    <h2>Pending Tasks</h2>
    <ul class="task-list" id="pendingList"></ul>

    <h2>Completed Tasks</h2>
    <ul class="task-list" id="completedList"></ul>

  </div>
<script ></script>

</body>
</html>
